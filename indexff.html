<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Créateur de CV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c2531;
    --ink-soft:#5b6472;
    --paper:#f4f5f4;
    --surface:#ffffff;
    --border:#dcdfe3;
    --border-soft:#e9ebee;
    --accent:#1f6f5c;
    --radius:3px;
    --mono:'IBM Plex Mono', monospace;
    --sans:'Inter', system-ui, sans-serif;
    --serif:'Fraunces', Georgia, serif;
  }
  *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;}
  input,textarea,select{font-family:inherit;font-size:16px;}
  h1,h2,h3{margin:0;}

  /* ---------- TOPBAR ---------- */
  .topbar{
    position:sticky;top:0;z-index:40;
    display:flex;align-items:center;gap:16px;
    padding:12px 20px;
    background:var(--ink);
    color:#fff;
    flex-wrap:wrap;
  }
  .brand{
    display:flex;align-items:baseline;gap:8px;
    font-family:var(--serif);
    font-size:19px;font-weight:600;
    margin-right:auto;
    white-space:nowrap;
  }
  .brand small{
    font-family:var(--mono);font-size:10px;font-weight:400;
    color:#9aa5b1;letter-spacing:.06em;
  }
  .tpl-switch{
    display:flex;background:#2a3547;border-radius:999px;padding:3px;gap:2px;
  }
  .tpl-switch button{
    border:none;background:transparent;color:#b7c0cc;
    padding:7px 14px;border-radius:999px;font-size:13px;font-weight:500;
    transition:background .15s, color .15s;
  }
  .tpl-switch button.active{background:#fff;color:var(--ink);}
  .tpl-select{
    background:#2a3547;color:#fff;border:1px solid #48566b;border-radius:999px;
    padding:8px 12px;font-size:13px;font-weight:500;
  }
  .tpl-select:focus{outline:none;border-color:var(--accent);}
  .accent-picker{display:flex;align-items:center;gap:6px;}
  .accent-picker span{width:20px;height:20px;border-radius:50%;border:2px solid transparent;display:block;cursor:pointer;padding:0;}
  .accent-picker span.active{border-color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,.5);}
  .top-actions{display:flex;gap:8px;}
  .btn{
    border:1px solid transparent;border-radius:var(--radius);
    padding:9px 15px;font-size:13px;font-weight:600;
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-ghost{background:transparent;color:#fff;border-color:#48566b;}
  .btn-ghost:hover{background:#2a3547;}
  .btn-primary:hover{filter:brightness(1.08);}

  /* ---------- WORKSPACE ---------- */
  .workspace{
    display:grid;
    grid-template-columns:190px minmax(360px,540px) 1fr;
    align-items:start;
    min-height:calc(100vh - 54px);
  }
  .index-nav{
    position:sticky;top:54px;
    height:calc(100vh - 54px);
    overflow-y:auto;
    padding:22px 0;
    border-right:1px solid var(--border);
    background:var(--surface);
  }
  .index-nav a{
    display:flex;gap:10px;align-items:baseline;
    padding:9px 20px;
    text-decoration:none;color:var(--ink-soft);
    font-size:13px;font-weight:500;
    border-left:2px solid transparent;
  }
  .index-nav a:hover{color:var(--ink);background:var(--paper);}
  .index-nav a .num{font-family:var(--mono);font-size:11px;color:var(--accent);}
  .index-nav a.active{border-left-color:var(--accent);color:var(--ink);background:var(--paper);}

  .form-panel{
    padding:28px 26px 100px;
    border-right:1px solid var(--border);
    background:var(--surface);
  }
  .form-section{padding-bottom:34px;margin-bottom:34px;border-bottom:1px solid var(--border-soft);scroll-margin-top:70px;}
  .form-section:last-child{border-bottom:none;}
  .form-section h2{
    font-family:var(--mono);font-size:12px;font-weight:500;
    letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);
    margin-bottom:16px;display:flex;gap:8px;align-items:baseline;
  }
  .form-section h2 .num{color:var(--accent);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
  .field input[type=text],.field input[type=email],.field input[type=tel],.field input[type=url],.field textarea,.field select{
    width:100%;padding:10px 11px;border:1px solid var(--border);border-radius:var(--radius);
    background:#fdfdfd;color:var(--ink);
  }
  .field input:focus,.field textarea:focus,.field select:focus{
    outline:none;border-color:var(--accent);background:#fff;
  }
  .field textarea{resize:vertical;min-height:64px;line-height:1.45;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .row3{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end;}
  .check-row{display:flex;align-items:center;gap:7px;margin-top:2px;}
  .check-row label{margin:0;font-size:12.5px;color:var(--ink-soft);font-weight:500;}

  .entry-card{
    border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 16px 6px;margin-bottom:14px;position:relative;background:#fdfdfd;
  }
  .entry-card .entry-remove{
    position:absolute;top:10px;right:10px;
    border:none;background:none;color:var(--ink-soft);font-size:18px;line-height:1;
    padding:4px 6px;border-radius:4px;
  }
  .entry-card .entry-remove:hover{background:#f0dede;color:#a33;}
  .add-btn{
    display:inline-flex;align-items:center;gap:6px;
    border:1px dashed var(--border);background:none;color:var(--ink-soft);
    padding:9px 14px;border-radius:var(--radius);font-size:13px;font-weight:600;width:100%;
    justify-content:center;
  }
  .add-btn:hover{border-color:var(--accent);color:var(--accent);}

  .tag-input-row{display:flex;gap:8px;margin-bottom:12px;}
  .tag-input-row input{flex:1;padding:10px 11px;border:1px solid var(--border);border-radius:var(--radius);}
  .tag-add{border:none;background:var(--ink);color:#fff;padding:0 16px;border-radius:var(--radius);font-weight:600;font-size:13px;}
  .chip-list{display:flex;flex-wrap:wrap;gap:8px;}
  .chip-edit{
    display:inline-flex;align-items:center;gap:7px;
    background:#eef1ee;color:var(--ink);border-radius:999px;
    padding:6px 8px 6px 13px;font-size:13px;
  }
  .chip-edit button{border:none;background:none;color:var(--ink-soft);font-size:14px;line-height:1;padding:2px;}

  .photo-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .photo-preview{
    width:64px;height:64px;border-radius:50%;object-fit:cover;
    border:1px solid var(--border);background:#eee;flex-shrink:0;
  }
  .photo-controls{display:flex;flex-direction:column;gap:6px;}
  .file-btn{
    border:1px solid var(--border);background:#fff;padding:7px 12px;
    border-radius:var(--radius);font-size:12.5px;font-weight:600;color:var(--ink-soft);
  }
  .file-btn:hover{border-color:var(--accent);color:var(--accent);}
  .hint{font-size:11.5px;color:#8a93a0;margin-top:2px;}

  /* ---------- PREVIEW ---------- */
  .preview-panel{
    padding:32px 24px 90px;
    background:
      radial-gradient(circle, #dfe2e2 1px, transparent 1px) 0 0/16px 16px,
      #e9ebe9;
    min-height:calc(100vh - 54px);
    display:flex;justify-content:center;
  }
  .preview-scroll{max-width:100%;overflow-x:auto;padding-bottom:10px;}
  .cv-page{
    width:210mm;min-height:297mm;
    background:#fff;
    box-shadow:0 1px 3px rgba(0,0,0,.08), 0 18px 40px -14px rgba(28,37,49,.28);
    padding:16mm 15mm;
  }

  /* ---- shared item styles (experience/education) ---- */
  .item{margin-bottom:14px;}
  .item-top{display:flex;justify-content:space-between;gap:12px;align-items:baseline;}
  .item-title{font-weight:600;font-size:14px;color:var(--ink);}
  .item-dates{font-family:var(--mono);font-size:11px;color:var(--ink-soft);white-space:nowrap;}
  .item-sub{font-size:12.5px;color:var(--accent);font-weight:500;margin-top:1px;}
  .item-desc{font-size:12.8px;line-height:1.55;color:#3a4250;margin:6px 0 0;}
  .item-desc-list{margin:6px 0 0;padding-left:16px;font-size:12.8px;line-height:1.55;color:#3a4250;}
  .item-desc-list li{margin-bottom:2px;}

  /* ---- classique template ---- */
  .cv-classic{font-family:var(--sans);color:var(--ink);}
  .cvc-header{text-align:center;margin-bottom:22px;padding-bottom:16px;border-bottom:2px solid var(--accent);}
  .cvc-name{font-family:var(--serif);font-size:30px;font-weight:600;letter-spacing:.01em;}
  .cvc-title{font-size:13.5px;color:var(--accent);font-weight:600;letter-spacing:.03em;margin-top:4px;text-transform:uppercase;}
  .cvc-contact{font-size:11.5px;color:var(--ink-soft);margin-top:10px;font-family:var(--mono);}
  .cvc-section{margin-bottom:20px;}
  .cvc-section h2{
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--ink);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #dfe2e2;
  }
  .cvc-chips{display:flex;flex-wrap:wrap;gap:7px;}
  .cvc-chips span{background:#f0f2f0;border-radius:3px;padding:4px 10px;font-size:12px;}
  .cvc-langs{display:flex;flex-wrap:wrap;gap:14px;font-size:12.5px;}

  /* ---- moderne template ---- */
  .cv-modern{display:grid;grid-template-columns:62mm 1fr;gap:0;min-height:265mm;margin:-16mm -15mm;}
  .cvm-side{background:var(--ink);color:#e7e9ec;padding:16mm 9mm;}
  .cvm-photo{width:32mm;height:32mm;border-radius:50%;object-fit:cover;display:block;margin:0 auto 14px;border:3px solid var(--accent);}
  .cvm-block{margin-bottom:22px;}
  .cvm-block h3{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--accent);margin-bottom:10px;
  }
  .cvm-contact-item{display:flex;flex-direction:column;font-size:11.5px;margin-bottom:9px;word-break:break-word;color:#dde0e4;}
  .cvm-label{font-family:var(--mono);font-size:9.5px;color:#8b95a3;text-transform:uppercase;letter-spacing:.06em;}
  .cvm-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .cvm-chips span{background-color:#323e52;border-radius:3px;padding:4px 8px;font-size:11px;}
  .cvm-lang{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:6px;color:#dde0e4;}
  .cvm-level{color:#9aa5b1;}
  .cvm-main{padding:16mm 13mm;}
  .cvm-header{margin-bottom:18px;}
  .cvm-header h1{font-family:var(--serif);font-size:29px;font-weight:600;color:var(--ink);}
  .cvm-jobtitle{font-size:13px;color:var(--accent);font-weight:600;margin-top:3px;}
  .cvm-section{margin-bottom:20px;}
  .cvm-section h2{
    font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #e3e5e3;
  }
  .cvm-section p{font-size:12.8px;line-height:1.6;color:#3a4250;}
  .cv-modern .item-sub{color:var(--accent);}

  /* ---- shared reusable chip / language rows (new templates) ---- */
  .chip-row{display:flex;flex-wrap:wrap;gap:7px;}
  .chip-row span{border-radius:3px;padding:4px 10px;font-size:12px;}
  .chip-row.light span{background:#f0f2f0;color:var(--ink);}
  .chip-row.dark span{background-color:#323e52;color:#e7e9ec;}
  .lang-row{font-size:12.5px;margin-bottom:7px;display:flex;justify-content:space-between;gap:10px;}
  .lang-row .lvl{color:var(--ink-soft);}
  .lang-row.dark{color:#dde0e4;}
  .lang-row.dark .lvl{color:#9aa5b1;}

  /* ---- minimaliste ---- */
  .cv-minimal{font-family:var(--sans);color:var(--ink);}
  .cvn-header{margin-bottom:30px;}
  .cvn-header h1{font-family:var(--serif);font-size:34px;font-weight:400;letter-spacing:.01em;}
  .cvn-title{font-size:13px;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin-top:7px;font-weight:500;}
  .cvn-contact{font-size:11px;color:var(--ink-soft);margin-top:16px;font-family:var(--mono);letter-spacing:.02em;}
  .cvn-section{margin-bottom:28px;}
  .cvn-section h2{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:14px;font-weight:500;}
  .cvn-section p{font-size:12.8px;line-height:1.75;color:#3a4250;max-width:155mm;}
  .cvn-flat{font-size:12.5px;color:#3a4250;line-height:1.8;}
  .cv-minimal .item{margin-bottom:20px;}
  .cv-minimal .item-title{font-weight:500;}
  .cv-minimal .item-sub{color:var(--ink-soft);font-weight:400;}

  /* ---- exécutif ---- */
  .cv-exec{font-family:var(--sans);color:var(--ink);}
  .cve-header{text-align:center;margin-bottom:26px;}
  .cve-header h1{font-family:var(--serif);font-size:31px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;}
  .cve-title{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-top:7px;font-weight:600;}
  .cve-rule{height:1px;background:#d5d8d5;margin:16px auto 12px;width:56%;position:relative;}
  .cve-rule::after{content:"";position:absolute;left:50%;top:-3px;transform:translateX(-50%);width:6px;height:6px;background:var(--accent);border-radius:50%;}
  .cve-contact{font-size:10.8px;color:var(--ink-soft);font-family:var(--mono);}
  .cve-body{display:grid;grid-template-columns:52mm 1fr;gap:12mm;}
  .cve-block{margin-bottom:24px;}
  .cve-block h3{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);border-bottom:1px solid #ddd;padding-bottom:7px;margin-bottom:11px;}
  .cve-main h2{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);border-bottom:1px solid #ddd;padding-bottom:6px;margin-bottom:12px;}
  .cve-main section{margin-bottom:22px;}
  .cve-main p{font-size:12.8px;line-height:1.6;color:#3a4250;}

  /* ---- compact ---- */
  .cv-compact{font-family:var(--sans);color:var(--ink);font-size:12px;}
  .cvp-topbar{height:4mm;background:var(--accent);margin:-16mm -15mm 10mm;}
  .cvp-head{margin-bottom:16px;}
  .cvp-head h1{font-family:var(--serif);font-size:25px;font-weight:600;}
  .cvp-title{font-size:12px;color:var(--accent);font-weight:600;margin-top:2px;}
  .cvp-body{display:grid;grid-template-columns:46mm 1fr;gap:9mm;}
  .cvp-side{border-right:1px solid #e3e5e3;padding-right:9mm;}
  .cvp-side h3{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 8px;}
  .cvp-contact-item{font-size:11px;margin-bottom:9px;color:#3a4250;}
  .cvp-contact-item b{display:block;font-family:var(--mono);font-size:9px;color:#9aa3ad;text-transform:uppercase;font-weight:500;}
  .cvp-block{margin-bottom:18px;}
  .cvp-main h2{font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink);margin-bottom:9px;padding-bottom:4px;border-bottom:1px solid #e3e5e3;}
  .cvp-main section{margin-bottom:16px;}
  .cvp-main .item{margin-bottom:11px;}
  .cvp-main .item-title{font-size:12.5px;}
  .cvp-main .item-desc,.cvp-main .item-desc-list{font-size:11.3px;}
  .cvp-main p{font-size:11.8px;line-height:1.55;color:#3a4250;}

  /* ---- créatif ---- */
  .cv-creatif{font-family:var(--sans);color:var(--ink);}
  .cvf-header{
    background:var(--accent);color:#fff;margin:-16mm -15mm 14mm;padding:14mm 15mm 12mm;
    display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;
  }
  .cvf-headtext h1{font-family:var(--serif);font-size:29px;font-weight:600;color:#fff;}
  .cvf-title{font-size:13px;color:rgba(255,255,255,.85);margin-top:4px;font-weight:500;}
  .cvf-contact{font-size:10.8px;color:rgba(255,255,255,.85);font-family:var(--mono);text-align:right;line-height:1.7;}
  .cvf-body section{margin-bottom:20px;}
  .cvf-body h2{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);border-left:3px solid var(--accent);padding-left:9px;margin-bottom:11px;}
  .cvf-body p{font-size:12.8px;line-height:1.6;color:#3a4250;}
  .cvf-columns{display:grid;grid-template-columns:1fr 62mm;gap:11mm;}

  /* ---- élégant (timeline) ---- */
  .cv-elegant{font-family:var(--sans);color:var(--ink);}
  .cvl-header{margin-bottom:28px;}
  .cvl-header h1{font-family:var(--serif);font-size:33px;font-weight:600;}
  .cvl-title{font-size:13px;color:var(--accent);font-weight:600;margin-top:5px;letter-spacing:.03em;}
  .cvl-contact{font-size:11px;color:var(--ink-soft);margin-top:12px;font-family:var(--mono);}
  .cvl-section{margin-bottom:26px;}
  .cvl-section h2{font-family:var(--serif);font-size:16px;font-weight:600;margin-bottom:16px;color:var(--ink);}
  .cvl-timeline{position:relative;padding-left:14px;border-left:2px solid #e6e8e6;margin-left:26mm;}
  .cvl-titem{position:relative;padding-bottom:20px;}
  .cvl-titem:last-child{padding-bottom:0;}
  .cvl-titem::before{content:"";position:absolute;left:-19px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .cvl-tdate{position:absolute;left:-26mm;top:1px;width:23mm;text-align:right;font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);}

  /* ---- technique (dev / grille) ---- */
  .cv-tech{font-family:var(--sans);color:var(--ink);}
  .cvt-header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:24px;}
  .cvt-prompt{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:6px;}
  .cvt-header h1{font-family:var(--mono);font-size:25px;font-weight:600;}
  .cvt-title{font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);margin-top:5px;}
  .cvt-contact{font-family:var(--mono);font-size:10.8px;color:var(--ink-soft);margin-top:10px;}
  .cvt-section{margin-bottom:22px;}
  .cvt-section h2{font-family:var(--mono);font-size:12px;color:var(--accent);margin-bottom:11px;font-weight:600;}
  .cvt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .cvt-grid span{font-family:var(--mono);font-size:10.8px;background-color:#f0f2f0;padding:6px 8px;border-radius:2px;border-left:2px solid var(--accent);}
  .cv-tech .lang-row{font-family:var(--mono);font-size:11px;}

  /* ---- prestige (bandeau photo) ---- */
  .cv-prestige{font-family:var(--sans);color:var(--ink);}
  .cvg-header{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
  .cvg-photo{width:22mm;height:22mm;border-radius:4px;object-fit:cover;border:2px solid var(--accent);}
  .cvg-headtext h1{font-family:var(--serif);font-size:28px;font-weight:600;}
  .cvg-title{font-size:13px;color:var(--accent);font-weight:600;margin-top:3px;}
  .cvg-contact-bar{
    display:flex;flex-wrap:wrap;gap:14px;font-size:11px;color:var(--ink-soft);font-family:var(--mono);
    padding:10px 0;border-top:1px solid #e3e5e3;border-bottom:1px solid #e3e5e3;margin-bottom:22px;
  }
  .cvg-section{margin-bottom:20px;}
  .cvg-section h2{
    font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);
    margin-bottom:11px;padding-bottom:5px;border-bottom:2px solid var(--accent);display:inline-block;
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width:1100px){
    .workspace{grid-template-columns:1fr;}
    .index-nav{
      position:sticky;top:54px;height:auto;width:100%;
      display:flex;overflow-x:auto;padding:10px 12px;gap:4px;border-right:none;border-bottom:1px solid var(--border);
    }
    .index-nav a{padding:8px 12px;border-left:none;border-bottom:2px solid transparent;white-space:nowrap;border-radius:0;}
    .index-nav a.active{border-left-color:transparent;border-bottom-color:var(--accent);}
    .form-panel{border-right:none;border-bottom:1px solid var(--border);}
    .preview-panel{padding:24px 12px 60px;}
  }
  @media (max-width:600px){
    .topbar{gap:10px;padding:10px 12px;}
    .brand{font-size:16px;}
    .row2{grid-template-columns:1fr;}
    .row3{grid-template-columns:1fr 1fr;}
    .row3 .check-row{grid-column:1/-1;}
  }

  /* ---------- PRINT ---------- */
  @media print{
    html,body{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important;}
    body *{visibility:hidden;}
    .cv-page,.cv-page *{visibility:visible;-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important;}
    .cv-page{
      position:absolute;top:0;left:0;margin:0;box-shadow:none;width:210mm;min-height:297mm;
    }
    .cvm-side{background:var(--ink) !important;}
    .cvm-chips span{background-color:#323e52 !important;}
    .cvc-chips span{background-color:#f0f2f0 !important;}
    .chip-row.light span{background-color:#f0f2f0 !important;}
    .chip-row.dark span{background-color:#323e52 !important;}
    .cvf-header{background:var(--accent) !important;}
    .cvp-topbar{background:var(--accent) !important;}
    @page{size:A4;margin:0;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Créateur de CV <small>ÉDITEUR &amp; APERÇU</small></div>
  <div class="tpl-switch" id="tplSwitch">
    <button data-tpl="classique">Classique</button>
    <button data-tpl="moderne">Moderne</button>
  </div>
  <select class="tpl-select" id="tplSelect">
    <option value="">Autres styles ▾</option>
    <option value="minimal">Minimaliste</option>
    <option value="executif">Exécutif</option>
    <option value="compact">Compact</option>
    <option value="creatif">Créatif</option>
    <option value="elegant">Élégant</option>
    <option value="technique">Technique</option>
    <option value="prestige">Prestige</option>
  </select>
  <div class="accent-picker" id="accentPicker"></div>
  <div class="top-actions">
    <button class="btn btn-ghost" id="resetBtn">Nouveau CV</button>
    <button class="btn btn-primary" id="exportBtn">Exporter en PDF</button>
  </div>
</div>

<div class="workspace">

  <nav class="index-nav" id="indexNav">
    <a href="#sec-identite" data-target="sec-identite"><span class="num">01</span> Identité</a>
    <a href="#sec-contact" data-target="sec-contact"><span class="num">02</span> Contact</a>
    <a href="#sec-profil" data-target="sec-profil"><span class="num">03</span> Profil</a>
    <a href="#sec-experience" data-target="sec-experience"><span class="num">04</span> Expérience</a>
    <a href="#sec-formation" data-target="sec-formation"><span class="num">05</span> Formation</a>
    <a href="#sec-competences" data-target="sec-competences"><span class="num">06</span> Compétences</a>
    <a href="#sec-langues" data-target="sec-langues"><span class="num">07</span> Langues</a>
    <a href="#sec-interets" data-target="sec-interets"><span class="num">08</span> Intérêts</a>
  </nav>

  <main class="form-panel" id="formPanel">

    <section class="form-section" id="sec-identite">
      <h2><span class="num">§01</span> Identité</h2>
      <div class="photo-row">
        <img class="photo-preview" id="photoPreview" alt="">
        <div class="photo-controls">
          <label class="file-btn">Choisir une photo<input type="file" accept="image/*" id="photoInput" style="display:none;"></label>
          <button class="file-btn" id="removePhotoBtn" type="button">Retirer la photo</button>
        </div>
      </div>
      <div class="field">
        <label>Nom complet</label>
        <input type="text" data-bind="fullName" placeholder="Camille Bernard">
      </div>
      <div class="field">
        <label>Intitulé du poste</label>
        <input type="text" data-bind="jobTitle" placeholder="Cheffe de Projet Digital">
      </div>
    </section>

    <section class="form-section" id="sec-contact">
      <h2><span class="num">§02</span> Contact</h2>
      <div class="row2">
        <div class="field"><label>Email</label><input type="email" data-bind="email" placeholder="prenom.nom@email.com"></div>
        <div class="field"><label>Téléphone</label><input type="tel" data-bind="phone" placeholder="06 XX XX XX XX"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Ville</label><input type="text" data-bind="location" placeholder="Paris, France"></div>
        <div class="field"><label>Site web / Portfolio</label><input type="text" data-bind="website" placeholder="monsite.fr"></div>
      </div>
      <div class="field"><label>LinkedIn</label><input type="text" data-bind="linkedin" placeholder="linkedin.com/in/..."></div>
    </section>

    <section class="form-section" id="sec-profil">
      <h2><span class="num">§03</span> Profil</h2>
      <div class="field">
        <label>Résumé professionnel</label>
        <textarea data-bind="profile" rows="4" placeholder="Décrivez en quelques lignes votre profil, vos points forts et votre objectif."></textarea>
      </div>
    </section>

    <section class="form-section" id="sec-experience">
      <h2><span class="num">§04</span> Expérience</h2>
      <div id="experienceList"></div>
      <button class="add-btn" id="addExperience" type="button">+ Ajouter une expérience</button>
    </section>

    <section class="form-section" id="sec-formation">
      <h2><span class="num">§05</span> Formation</h2>
      <div id="educationList"></div>
      <button class="add-btn" id="addEducation" type="button">+ Ajouter une formation</button>
    </section>

    <section class="form-section" id="sec-competences">
      <h2><span class="num">§06</span> Compétences</h2>
      <div class="tag-input-row">
        <input type="text" id="skillInput" placeholder="Ex. Gestion de projet — Entrée pour ajouter">
        <button class="tag-add" id="skillAddBtn" type="button">Ajouter</button>
      </div>
      <div class="chip-list" id="skillList"></div>
    </section>

    <section class="form-section" id="sec-langues">
      <h2><span class="num">§07</span> Langues</h2>
      <div id="languageList"></div>
      <button class="add-btn" id="addLanguage" type="button">+ Ajouter une langue</button>
    </section>

    <section class="form-section" id="sec-interets">
      <h2><span class="num">§08</span> Centres d'intérêt</h2>
      <div class="tag-input-row">
        <input type="text" id="interestInput" placeholder="Ex. Photographie — Entrée pour ajouter">
        <button class="tag-add" id="interestAddBtn" type="button">Ajouter</button>
      </div>
      <div class="chip-list" id="interestList"></div>
    </section>

  </main>

  <aside class="preview-panel">
    <div class="preview-scroll">
      <div class="cv-page" id="cvPage"></div>
    </div>
  </aside>

</div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "cv-builder-state-v1";
  var ACCENTS = ["#1f6f5c","#2a4d7a","#7a2a3a","#3a3f47","#a3701f"];
  var LEVELS = ["Débutant","Intermédiaire","Courant","Bilingue","Langue maternelle"];

  function esc(s){
    return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
    });
  }

  function defaultState(){
    return {
      template:"moderne",
      accent:"#1f6f5c",
      photo:null,
      fullName:"Camille Bernard",
      jobTitle:"Cheffe de Projet Digital",
      email:"prenom.nom@email.com",
      phone:"06 XX XX XX XX",
      location:"Paris, France",
      website:"monsite.fr",
      linkedin:"linkedin.com/in/prenom-nom",
      profile:"Cheffe de projet digital avec 6 ans d'expérience dans le pilotage de produits web et la coordination d'équipes pluridisciplinaires. Sens de l'organisation, orientation résultats et goût pour les problématiques techniques.",
      experiences:[
        {title:"Cheffe de Projet Digital", company:"Nova Interactive", location:"Paris", start:"2022", end:"", current:true,
         description:"Pilotage de 5 projets web simultanés pour des clients grands comptes.\nMise en place d'une méthodologie agile réduisant les délais de livraison de 20%.\nEncadrement d'une équipe de 4 personnes."},
        {title:"Chargée de Projet Web", company:"Studio Lumen", location:"Lyon", start:"2019", end:"2022", current:false,
         description:"Coordination de la refonte de 12 sites vitrines.\nRédaction des cahiers des charges et suivi budgétaire."}
      ],
      educations:[
        {degree:"Master Management de Projets Digitaux", school:"Université Paris-Dauphine", location:"Paris", start:"2017", end:"2019", description:""},
        {degree:"Licence Information-Communication", school:"Université Lyon 2", location:"Lyon", start:"2014", end:"2017", description:""}
      ],
      skills:["Gestion de projet","Méthode Agile/Scrum","Jira","Figma","Analyse de données","Négociation"],
      languages:[{name:"Français", level:"Langue maternelle"},{name:"Anglais", level:"Courant"},{name:"Espagnol", level:"Intermédiaire"}],
      interests:["Photographie","Course à pied","Design graphique"]
    };
  }

  function emptyState(){
    return {
      template:"moderne", accent:"#1f6f5c", photo:null,
      fullName:"", jobTitle:"", email:"", phone:"", location:"", website:"", linkedin:"", profile:"",
      experiences:[{title:"", company:"", location:"", start:"", end:"", current:false, description:""}],
      educations:[{degree:"", school:"", location:"", start:"", end:"", description:""}],
      skills:[], languages:[], interests:[]
    };
  }

  function loadState(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return defaultState();
      var parsed = JSON.parse(raw);
      return Object.assign(defaultState(), parsed);
    }catch(e){ return defaultState(); }
  }

  function saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }

  var state = loadState();

  /* ---------------- DOM refs ---------------- */
  var formPanel = document.getElementById("formPanel");
  var cvPage = document.getElementById("cvPage");
  var experienceList = document.getElementById("experienceList");
  var educationList = document.getElementById("educationList");
  var languageList = document.getElementById("languageList");
  var skillList = document.getElementById("skillList");
  var interestList = document.getElementById("interestList");
  var photoPreview = document.getElementById("photoPreview");
  var accentPicker = document.getElementById("accentPicker");
  var tplSwitch = document.getElementById("tplSwitch");
  var tplSelect = document.getElementById("tplSelect");

  /* ---------------- static field binding ---------------- */
  function fillStaticFields(){
    Array.prototype.forEach.call(formPanel.querySelectorAll("[data-bind]"), function(el){
      var key = el.getAttribute("data-bind");
      if(state[key] != null) el.value = state[key];
    });
    photoPreview.src = state.photo || "data:image/svg+xml;utf8," + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect width="64" height="64" fill="%23e5e7e5"/><text x="32" y="38" font-size="22" text-anchor="middle" fill="%23aab0ab" font-family="sans-serif">?</text></svg>'
    );
  }

  /* ---------------- dynamic list builders ---------------- */
  function buildExperienceForm(){
    experienceList.innerHTML = state.experiences.map(function(e, i){
      return '<div class="entry-card" data-index="'+i+'">'
        + '<button type="button" class="entry-remove" data-action="remove-experience" data-index="'+i+'">&times;</button>'
        + '<div class="field"><label>Intitulé du poste</label><input type="text" data-list="experiences" data-index="'+i+'" data-field="title" value="'+esc(e.title)+'" placeholder="Cheffe de Projet Digital"></div>'
        + '<div class="row2">'
          + '<div class="field"><label>Entreprise</label><input type="text" data-list="experiences" data-index="'+i+'" data-field="company" value="'+esc(e.company)+'"></div>'
          + '<div class="field"><label>Lieu</label><input type="text" data-list="experiences" data-index="'+i+'" data-field="location" value="'+esc(e.location)+'"></div>'
        + '</div>'
        + '<div class="row3">'
          + '<div class="field"><label>Début</label><input type="text" data-list="experiences" data-index="'+i+'" data-field="start" value="'+esc(e.start)+'" placeholder="2022"></div>'
          + '<div class="field"><label>Fin</label><input type="text" data-list="experiences" data-index="'+i+'" data-field="end" value="'+esc(e.end)+'" placeholder="2024" '+(e.current?'disabled':'')+'></div>'
          + '<div class="check-row"><input type="checkbox" id="cur-'+i+'" data-list="experiences" data-index="'+i+'" data-field="current" '+(e.current?'checked':'')+'><label for="cur-'+i+'">En cours</label></div>'
        + '</div>'
        + '<div class="field"><label>Description (une ligne = un point)</label><textarea data-list="experiences" data-index="'+i+'" data-field="description" rows="3">'+esc(e.description)+'</textarea></div>'
        + '</div>';
    }).join("");
  }

  function buildEducationForm(){
    educationList.innerHTML = state.educations.map(function(e, i){
      return '<div class="entry-card" data-index="'+i+'">'
        + '<button type="button" class="entry-remove" data-action="remove-education" data-index="'+i+'">&times;</button>'
        + '<div class="field"><label>Diplôme</label><input type="text" data-list="educations" data-index="'+i+'" data-field="degree" value="'+esc(e.degree)+'" placeholder="Master ..."></div>'
        + '<div class="row2">'
          + '<div class="field"><label>Établissement</label><input type="text" data-list="educations" data-index="'+i+'" data-field="school" value="'+esc(e.school)+'"></div>'
          + '<div class="field"><label>Lieu</label><input type="text" data-list="educations" data-index="'+i+'" data-field="location" value="'+esc(e.location)+'"></div>'
        + '</div>'
        + '<div class="row2">'
          + '<div class="field"><label>Début</label><input type="text" data-list="educations" data-index="'+i+'" data-field="start" value="'+esc(e.start)+'" placeholder="2017"></div>'
          + '<div class="field"><label>Fin</label><input type="text" data-list="educations" data-index="'+i+'" data-field="end" value="'+esc(e.end)+'" placeholder="2019"></div>'
        + '</div>'
        + '<div class="field"><label>Détails (optionnel)</label><textarea data-list="educations" data-index="'+i+'" data-field="description" rows="2">'+esc(e.description)+'</textarea></div>'
        + '</div>';
    }).join("");
  }

  function buildLanguageForm(){
    languageList.innerHTML = state.languages.map(function(l, i){
      return '<div class="entry-card" data-index="'+i+'">'
        + '<button type="button" class="entry-remove" data-action="remove-language" data-index="'+i+'">&times;</button>'
        + '<div class="row2">'
          + '<div class="field"><label>Langue</label><input type="text" data-list="languages" data-index="'+i+'" data-field="name" value="'+esc(l.name)+'" placeholder="Anglais"></div>'
          + '<div class="field"><label>Niveau</label><select data-list="languages" data-index="'+i+'" data-field="level">'
            + LEVELS.map(function(lv){ return '<option '+(l.level===lv?'selected':'')+'>'+lv+'</option>'; }).join("")
          + '</select></div>'
        + '</div>'
        + '</div>';
    }).join("");
  }

  function buildChips(container, arr, removeAction){
    container.innerHTML = arr.map(function(val, i){
      return '<span class="chip-edit">'+esc(val)+'<button type="button" data-action="'+removeAction+'" data-index="'+i+'">&times;</button></span>';
    }).join("");
  }

  function buildAccentPicker(){
    accentPicker.innerHTML = ACCENTS.map(function(c){
      return '<span data-accent="'+c+'" style="background:'+c+'" class="'+(state.accent===c?'active':'')+'"></span>';
    }).join("");
  }

  function buildTplSwitch(){
    var isPrimary = state.template === "classique" || state.template === "moderne";
    Array.prototype.forEach.call(tplSwitch.querySelectorAll("button"), function(btn){
      btn.classList.toggle("active", isPrimary && btn.getAttribute("data-tpl") === state.template);
    });
    tplSelect.value = isPrimary ? "" : state.template;
  }

  /* ---------------- preview rendering ---------------- */
  function descToHtml(text){
    var lines = (text || "").split("\n").map(function(s){ return s.trim(); }).filter(Boolean);
    if(lines.length === 0) return "";
    if(lines.length === 1) return '<p class="item-desc">'+esc(lines[0])+'</p>';
    return '<ul class="item-desc-list">' + lines.map(function(l){ return '<li>'+esc(l)+'</li>'; }).join("") + '</ul>';
  }

  function expItemHtml(e){
    var dateRange = esc(e.start) + ((e.start || e.end || e.current) ? " — " : "") + (e.current ? "Présent" : esc(e.end));
    return '<div class="item">'
      + '<div class="item-top"><span class="item-title">'+ (esc(e.title) || "Intitulé du poste") +'</span><span class="item-dates">'+dateRange+'</span></div>'
      + '<div class="item-sub">'+esc(e.company)+(e.location ? " · "+esc(e.location) : "")+'</div>'
      + descToHtml(e.description)
      + '</div>';
  }

  function eduItemHtml(e){
    var dateRange = esc(e.start) + ((e.start || e.end) ? " — " : "") + esc(e.end);
    return '<div class="item">'
      + '<div class="item-top"><span class="item-title">'+ (esc(e.degree) || "Diplôme") +'</span><span class="item-dates">'+dateRange+'</span></div>'
      + '<div class="item-sub">'+esc(e.school)+(e.location ? " · "+esc(e.location) : "")+'</div>'
      + descToHtml(e.description)
      + '</div>';
  }

  function contactItems(s){
    var items = [];
    if(s.location) items.push({label:"Lieu", value:s.location});
    if(s.phone) items.push({label:"Tél", value:s.phone});
    if(s.email) items.push({label:"Email", value:s.email});
    if(s.website) items.push({label:"Site", value:s.website});
    if(s.linkedin) items.push({label:"LinkedIn", value:s.linkedin});
    return items;
  }

  function buildClassique(s){
    var contacts = contactItems(s);
    return '<div class="cv-classic">'
      + '<header class="cvc-header">'
        + '<h1 class="cvc-name">'+(esc(s.fullName) || "Votre nom")+'</h1>'
        + '<div class="cvc-title">'+(esc(s.jobTitle) || "Intitulé du poste")+'</div>'
        + (contacts.length ? '<div class="cvc-contact">'+contacts.map(function(c){ return esc(c.value); }).join(" &nbsp;·&nbsp; ")+'</div>' : "")
      + '</header>'
      + (s.profile ? '<section class="cvc-section"><h2>Profil</h2><p class="item-desc">'+esc(s.profile)+'</p></section>' : "")
      + (s.experiences.some(hasContent) ? '<section class="cvc-section"><h2>Expérience</h2>'+s.experiences.filter(hasContent).map(expItemHtml).join("")+'</section>' : "")
      + (s.educations.some(hasContent) ? '<section class="cvc-section"><h2>Formation</h2>'+s.educations.filter(hasContent).map(eduItemHtml).join("")+'</section>' : "")
      + (s.skills.length ? '<section class="cvc-section"><h2>Compétences</h2><div class="cvc-chips">'+s.skills.map(function(sk){ return '<span>'+esc(sk)+'</span>'; }).join("")+'</div></section>' : "")
      + (s.languages.length ? '<section class="cvc-section"><h2>Langues</h2><div class="cvc-langs">'+s.languages.map(function(l){ return '<span>'+esc(l.name)+' — '+esc(l.level)+'</span>'; }).join("")+'</div></section>' : "")
      + (s.interests.length ? '<section class="cvc-section"><h2>Centres d\'intérêt</h2><div class="cvc-chips">'+s.interests.map(function(i){ return '<span>'+esc(i)+'</span>'; }).join("")+'</div></section>' : "")
      + '</div>';
  }

  function buildModerne(s){
    var contacts = contactItems(s);
    return '<div class="cv-modern">'
      + '<aside class="cvm-side">'
        + (s.photo ? '<img class="cvm-photo" src="'+s.photo+'" alt="">' : "")
        + (contacts.length ? '<div class="cvm-block"><h3>Contact</h3>'+contacts.map(function(c){ return '<div class="cvm-contact-item"><span class="cvm-label">'+c.label+'</span><span>'+esc(c.value)+'</span></div>'; }).join("")+'</div>' : "")
        + (s.skills.length ? '<div class="cvm-block"><h3>Compétences</h3><div class="cvm-chips">'+s.skills.map(function(sk){ return '<span>'+esc(sk)+'</span>'; }).join("")+'</div></div>' : "")
        + (s.languages.length ? '<div class="cvm-block"><h3>Langues</h3>'+s.languages.map(function(l){ return '<div class="cvm-lang"><span>'+esc(l.name)+'</span><span class="cvm-level">'+esc(l.level)+'</span></div>'; }).join("")+'</div>' : "")
        + (s.interests.length ? '<div class="cvm-block"><h3>Centres d\'intérêt</h3><div class="cvm-chips">'+s.interests.map(function(i){ return '<span>'+esc(i)+'</span>'; }).join("")+'</div></div>' : "")
      + '</aside>'
      + '<main class="cvm-main">'
        + '<header class="cvm-header"><h1>'+(esc(s.fullName) || "Votre nom")+'</h1><div class="cvm-jobtitle">'+(esc(s.jobTitle) || "Intitulé du poste")+'</div></header>'
        + (s.profile ? '<section class="cvm-section"><h2>Profil</h2><p>'+esc(s.profile)+'</p></section>' : "")
        + (s.experiences.some(hasContent) ? '<section class="cvm-section"><h2>Expérience</h2>'+s.experiences.filter(hasContent).map(expItemHtml).join("")+'</section>' : "")
        + (s.educations.some(hasContent) ? '<section class="cvm-section"><h2>Formation</h2>'+s.educations.filter(hasContent).map(eduItemHtml).join("")+'</section>' : "")
      + '</main>'
      + '</div>';
  }

  function hasContent(e){
    for(var k in e){ if(e[k] && e[k] !== false) return true; }
    return false;
  }

  function chipsHtml(arr, variant){
    if(!arr.length) return "";
    return '<div class="chip-row '+variant+'">' + arr.map(function(v){ return '<span>'+esc(v)+'</span>'; }).join("") + '</div>';
  }

  function langsHtml(arr, variant){
    if(!arr.length) return "";
    return arr.map(function(l){
      return '<div class="lang-row '+variant+'"><span>'+esc(l.name)+'</span><span class="lvl">'+esc(l.level)+'</span></div>';
    }).join("");
  }

  function buildMinimal(s){
    var contacts = contactItems(s);
    return '<div class="cv-minimal">'
      + '<header class="cvn-header">'
        + '<h1>'+(esc(s.fullName) || "Votre nom")+'</h1>'
        + '<div class="cvn-title">'+(esc(s.jobTitle) || "Intitulé du poste")+'</div>'
        + (contacts.length ? '<div class="cvn-contact">'+contacts.map(function(c){ return esc(c.value); }).join("    ")+'</div>' : "")
      + '</header>'
      + (s.profile ? '<section class="cvn-section"><h2>Profil</h2><p>'+esc(s.profile)+'</p></section>' : "")
      + (s.experiences.some(hasContent) ? '<section class="cvn-section"><h2>Expérience</h2>'+s.experiences.filter(hasContent).map(expItemHtml).join("")+'</section>' : "")

  function buildExecutif(s){

  function buildCompact(s){
    var contacts = contactItems(s);
    return '<div class="cv-compact">'

      + '<div class="cvp-head"><h1>'+(esc(s.fullName) || "Votre nom")+'</h1><div class="cvp-title">'+(esc(s.jobTitle) || "Intitulé du poste")+'</div></div>'

  function buildCreatif(s){

          + '<div class="cvf-col">'
            + (s.experiences.some(hasContent) ? '<section><h2>Expérience</h2>'+s.experiences.filter(hasContent).map(expItemHtml).join("")+'</section>' : "")
            + (s.educations.some(hasContent) ? '<section><h2>Formation</h2>'+s.educations.filter(hasContent).map(eduItemHtml).join("")+'</section>' : "")
          + '</div>'

            + (s.skills.length ? '<section><h2>Compétences</h2>'+chipsHtml(s.skills,"light")+'</section>' : "")

      + '</div>';

  function timelineExpHtml(e){
    var dateRange = esc(e.start) + ((e.start || e.end || e.current) ? " — " : "") + (e.current ? "Présent" : esc(e.end));
    return '<div class="cvl-titem"><div class="cvl-tdate">'+dateRange+'</div>'
      + '<div class="item-title">'+ (esc(e.title) || "Intitulé du poste") +'</div>'
      + '<div class="item-sub">'+esc(e.company)+(e.location ? " · "+esc(e.location) : "")+'</div>'
      + descToHtml(e.description)
      + '</div>';
  }

  function timelineEduHtml(e){
    var dateRange = esc(e.start) + ((e.start || e.end) ? " — " : "") + esc(e.end);
    return '<div class="cvl-titem"><div class="cvl-tdate">'+dateRange+'</div>'
      + '<div class="item-title">'+ (esc(e.degree) || "Diplôme") +'</div>'
      + '<div class="item-sub">'+esc(e.school)+(e.location ? " · "+esc(e.location) : "")+'</div>'
      + descToHtml(e.description)
      + '</div>';
  }

  function buildElegant(s){
    var contacts = contactItems(s);
    return '<div class="cv-elegant">'
      + '<header class="cvl-header">'
        + '<h1>'+(esc(s.fullName) || "Votre nom")+'</h1>'
        + '<div class="cvl-title">'+(esc(s.jobTitle) || "Intitulé du poste")+'</div>'
        + (contacts.length ? '<div class="cvl-contact">'+contacts.map(function(c){ return esc(c.value); }).join(" &nbsp;·&nbsp; ")+'</div>' : "")
      + '</header>'
      + (s.profile ? '<section class="cvl-section"><h2>Profil</h2><p class="item-desc">'+esc(s.profile)+'</p></section>' : "")
      + (s.experiences.some(hasContent) ? '<section class="cvl-section"><h2>Expérience</h2><div class="cvl-timeline">'+s.experiences.filter(hasContent).map(timelineExpHtml).join("")+'</div></section>' : "")
      + (s.educations.some(hasContent) ? '<section class="cvl-section"><h2>Formation</h2><div class="cvl-timeline">'+s.educations.filter(hasContent).map(timelineEduHtml).join("")+'</div></section>' : "")
      + (s.skills.length ? '<section class="cvl-section"><h2>Compétences</h2>'+chipsHtml(s.skills,"light")+'</section>' : "")
      + (s.languages.length ? '<section class="cvl-section"><h2>Langues</h2>'+langsHtml(s.languages,"light")+'</section>' : "")
      + (s.interests.length ? '<section class="cvl-section"><h2>Centres d\'intérêt</h2>'+chipsHtml(s.interests,"light")+'</section>' : "")
      + '</div>';
  }

  function buildTechnique(s){
    var contacts = contactItems(s);
    return '<div class="cv-tech">'
      + '<header class="cvt-header">'
        + '<div class="cvt-prompt">~/cv --format=pdf</div>'
        + '<h1>'+(esc(s.fullName) || "Votre nom")+'</h1>'
        + '<div class="cvt-title">'+(esc(s.jobTitle) || "Intitulé du poste")+'</div>'
        + (contacts.length ? '<div class="cvt-contact">'+contacts.map(function(c){ return esc(c.value); }).join("  ·  ")+'</div>' : "")
      + '</header>'
      + (s.profile ? '<section class="cvt-section"><h2>// Profil</h2><p class="item-desc">'+esc(s.profile)+'</p></section>' : "")
      + (s.experiences.some(hasContent) ? '<section class="cvt-section"><h2>// Expérience</h2>'+s.experiences.filter(hasContent).map(expItemHtml).join("")+'</section>' : "")
      + (s.educations.some(hasContent) ? '<section class="cvt-section"><h2>// Formation</h2>'+s.educations.filter(hasContent).map(eduItemHtml).join("")+'</section>' : "")
      + (s.skills.length ? '<section class="cvt-section"><h2>// Stack &amp; compétences</h2><div class="cvt-grid">'+s.skills.map(function(sk){ return '<span>'+esc(sk)+'</span>'; }).join("")+'</div></section>' : "")
      + (s.languages.length ? '<section class="cvt-section"><h2>// Langues</h2>'+langsHtml(s.languages,"light")+'</section>' : "")
      + (s.interests.length ? '<section class="cvt-section"><h2>// Centres d\'intérêt</h2>'+chipsHtml(s.interests,"light")+'</section>' : "")
      + '</div>';
  }

  function buildPrestige(s){
    var contacts = contactItems(s);
    var photoHtml = s.photo ? '<img class="cvg-photo" src="'+s.photo+'" alt="">' : "";
    return '<div class="cv-prestige">'
      + '<header class="cvg-header">'
        + photoHtml
        + '<div class="cvg-headtext"><h1>'+(esc(s.fullName) || "Votre nom")+'</h1><div class="cvg-title">'+(esc(s.jobTitle) || "Intitulé du poste")+'</div></div>'
      + '</header>'
      + (contacts.length ? '<div class="cvg-contact-bar">'+contacts.map(function(c){ return '<span>'+esc(c.value)+'</span>'; }).join("")+'</div>' : "")
      + (s.profile ? '<section class="cvg-section"><h2>Profil</h2><p class="item-desc">'+esc(s.profile)+'</p></section>' : "")
      + (s.experiences.some(hasContent) ? '<section class="cvg-section"><h2>Expérience</h2>'+s.experiences.filter(hasContent).map(expItemHtml).join("")+'</section>' : "")
      + (s.educations.some(hasContent) ? '<section class="cvg-section"><h2>Formation</h2>'+s.educations.filter(hasContent).map(eduItemHtml).join("")+'</section>' : "")
      + (s.skills.length ? '<section class="cvg-section"><h2>Compétences</h2>'+chipsHtml(s.skills,"light")+'</section>' : "")
      + (s.languages.length ? '<section class="cvg-section"><h2>Langues</h2>'+langsHtml(s.languages,"light")+'</section>' : "")
      + (s.interests.length ? '<section class="cvg-section"><h2>Centres d\'intérêt</h2>'+chipsHtml(s.interests,"light")+'</section>' : "")
      + '</div>';
  }

  function renderPreview(){
    cvPage.style.setProperty("--accent", state.accent);
    var builders = {
      classique: buildClassique,
      moderne: buildModerne,
      minimal: buildMinimal,
      executif: buildExecutif,
      compact: buildCompact,
      creatif: buildCreatif,
      elegant: buildElegant,
      technique: buildTechnique,
      prestige: buildPrestige
    };
    var build = builders[state.template] || buildClassique;
    cvPage.innerHTML = build(state);
  }

  function renderAll(){
    fillStaticFields();
    buildExperienceForm();
    buildEducationForm();
    buildLanguageForm();
    buildChips(skillList, state.skills, "remove-skill");
    buildChips(interestList, state.interests, "remove-interest");
    buildAccentPicker();
    buildTplSwitch();
    renderPreview();
  }

  /* ---------------- event delegation: form inputs ---------------- */
  formPanel.addEventListener("input", handleInputOrChange);
  formPanel.addEventListener("change", handleInputOrChange);

  function handleInputOrChange(e){
    var t = e.target;
    if(t.id === "photoInput") return;
    if(t.hasAttribute("data-bind")){
      state[t.getAttribute("data-bind")] = t.value;
      renderPreview(); saveState();
      return;
    }
    if(t.hasAttribute("data-list")){
      var list = state[t.getAttribute("data-list")];
      var idx = parseInt(t.getAttribute("data-index"), 10);
      var field = t.getAttribute("data-field");
      if(!list[idx]) return;
      if(t.type === "checkbox") list[idx][field] = t.checked;
      else list[idx][field] = t.value;
      if(field === "current" && t.type === "checkbox"){
        buildExperienceForm();
      }
      renderPreview(); saveState();
    }
  }

  /* ---------------- click delegation: add/remove ---------------- */
  formPanel.addEventListener("click", function(e){
    var t = e.target;
    var action = t.getAttribute("data-action");
    if(action){
      var idx = parseInt(t.getAttribute("data-index"), 10);
      if(action === "remove-experience"){ state.experiences.splice(idx,1); buildExperienceForm(); }
      else if(action === "remove-education"){ state.educations.splice(idx,1); buildEducationForm(); }
      else if(action === "remove-language"){ state.languages.splice(idx,1); buildLanguageForm(); }
      else if(action === "remove-skill"){ state.skills.splice(idx,1); buildChips(skillList, state.skills, "remove-skill"); }
      else if(action === "remove-interest"){ state.interests.splice(idx,1); buildChips(interestList, state.interests, "remove-interest"); }
      renderPreview(); saveState();
      return;
    }
    if(t.id === "addExperience"){
      state.experiences.push({title:"",company:"",location:"",start:"",end:"",current:false,description:""});
      buildExperienceForm(); renderPreview(); saveState();
    }
    if(t.id === "addEducation"){
      state.educations.push({degree:"",school:"",location:"",start:"",end:"",description:""});
      buildEducationForm(); renderPreview(); saveState();
    }
    if(t.id === "addLanguage"){
      state.languages.push({name:"",level:LEVELS[0]});
      buildLanguageForm(); renderPreview(); saveState();
    }
    if(t.id === "removePhotoBtn"){
      state.photo = null; fillStaticFields(); renderPreview(); saveState();
    }
  });

  /* ---------------- skills / interests tag inputs ---------------- */
  function setupTagInput(inputId, btnId, arrKey, container, removeAction){
    var input = document.getElementById(inputId);
    var btn = document.getElementById(btnId);
    function add(){
      var v = input.value.trim();
      if(!v) return;
      state[arrKey].push(v);
      input.value = "";
      buildChips(container, state[arrKey], removeAction);
      renderPreview(); saveState();
      input.focus();
    }
    btn.addEventListener("click", add);
    input.addEventListener("keydown", function(e){
      if(e.key === "Enter"){ e.preventDefault(); add(); }
    });
  }
  setupTagInput("skillInput","skillAddBtn","skills",skillList,"remove-skill");
  setupTagInput("interestInput","interestAddBtn","interests",interestList,"remove-interest");

  /* ---------------- photo upload ---------------- */
  document.getElementById("photoInput").addEventListener("change", function(e){
    var file = e.target.files && e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      state.photo = ev.target.result;
      fillStaticFields();
      renderPreview(); saveState();
    };
    reader.readAsDataURL(file);
  });

  /* ---------------- template switch ---------------- */
  tplSwitch.addEventListener("click", function(e){
    var btn = e.target.closest("button[data-tpl]");
    if(!btn) return;
    state.template = btn.getAttribute("data-tpl");
    buildTplSwitch(); renderPreview(); saveState();
  });

  tplSelect.addEventListener("change", function(){
    if(!tplSelect.value) return;
    state.template = tplSelect.value;
    buildTplSwitch(); renderPreview(); saveState();
  });

  /* ---------------- accent picker ---------------- */
  accentPicker.addEventListener("click", function(e){
    var el = e.target.closest("span[data-accent]");
    if(!el) return;
    state.accent = el.getAttribute("data-accent");
    buildAccentPicker(); renderPreview(); saveState();
  });

  /* ---------------- reset ---------------- */
  document.getElementById("resetBtn").addEventListener("click", function(){
    if(confirm("Créer un nouveau CV vierge ? Les données actuelles seront perdues.")){
      var tpl = state.template, accent = state.accent;
      state = emptyState();
      state.template = tpl; state.accent = accent;
      renderAll(); saveState();
    }
  });

  /* ---------------- export ---------------- */
  document.getElementById("exportBtn").addEventListener("click", function(){
    window.print();
  });

  /* ---------------- index nav scroll spy ---------------- */
  var navLinks = Array.prototype.slice.call(document.querySelectorAll("#indexNav a"));
  navLinks.forEach(function(link){
    link.addEventListener("click", function(e){
      e.preventDefault();
      var target = document.getElementById(link.getAttribute("data-target"));
      if(target) target.scrollIntoView({behavior:"smooth", block:"start"});
    });
  });
  var sections = navLinks.map(function(l){ return document.getElementById(l.getAttribute("data-target")); });
  function updateActiveNav(){
    var pos = formPanel.scrollTop !== undefined ? window.scrollY : 0;
    var current = sections[0];
    sections.forEach(function(sec){
      if(sec && sec.getBoundingClientRect().top - 100 <= 0) current = sec;
    });
    navLinks.forEach(function(l){
      l.classList.toggle("active", current && l.getAttribute("data-target") === current.id);
    });
  }
  window.addEventListener("scroll", updateActiveNav, {passive:true});

  /* ---------------- init ---------------- */
  renderAll();
  updateActiveNav();

})();
</script>
</body>
</html>
